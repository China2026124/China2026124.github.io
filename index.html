<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模块库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f5f7; padding-bottom: 60px; }

    /* 主页面 */
    #main { display: block; }
    .header {
      background: #fff;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .search-bar {
      flex: 1;
      background: #f2f2f7;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
    }
    .banner-box { position: relative; }
    .banner {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .banner-text {
      position: absolute;
      top: 20px; left: 20px;
      color: #fff;
      font-size: 20px;
      text-shadow: 0 0 5px #000;
    }
    .tabs {
      display: flex;
      background: #fff;
      padding: 12px 16px;
      gap: 12px;
      overflow-x: auto;
    }
    .tab {
      background: #f2f2f7;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }
    .user-bar {
      display: flex; align-items: center;
      padding: 16px;
      background: #fff;
    }
    .avatar {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: url('https://i.imgur.com/9oZsUeF.jpeg') center / cover;
      margin-right: 16px;
    }
    .username {
      font-size: 18px;
      font-weight: 500;
    }
    .notice {
      padding: 12px 16px;
      background: #f2f2f7;
      font-size: 16px;
    }
    .file-item {
      display: flex; align-items: center;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
      text-decoration: none;
      color: #000;
    }
    .file-icon {
      width: 40px; height: 40px;
      margin-right: 12px;
    }
    .file-name {
      flex: 1;
      font-size: 16px;
    }

    /* 滚动歌词 */
    .lyric-box {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 12px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
    }
    .lyric {
      display: inline-block;
      animation: scroll 15s linear infinite;
    }
    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <audio id="bgm" autoplay loop>
    <source src="https://cdn.isang.cc/music/%E9%82%B3%E7%B4%AB%E6%A3%8B-%E5%94%AF%E4%B8%80.mp3" type="audio/mpeg">
  

  <div id="main">
    <div class="header">
      <div class="search-bar">
        <span>🔍</span>
        <input placeholder="模块库">
        <span>⭐</span>
      </div>
      <span>🧰</span>
    </div>

    <div class="banner-box">
      <img class="banner" src="https://i.imgur.com/8X7Z1yY.jpeg" alt="背景图">
      <div class="banner-text">欢迎使用夏风音乐播放器！</div>
    </div>

    <div class="tabs">
      <div class="tab">🔵 官方群聊</div>
      <div class="tab">🔗 官方频道</div>
      <div class="tab">🐧 QQ历史</div>
      <div class="tab">💚 微信历史</div>
    </div>

    <div class="user-bar">
      <div class="avatar"></div>
      <div class="username">满天猴子我腚最红</div>
    </div>

    <div class="notice">本盘实时更新各类增加模块，欢迎访问</div>

    <a class="file-item" href="https://m.wandoujia.com/apps/566489/history" target="_blank">
      <img class="file-icon" src="https://img.icons8.com/fluency/48/000000/qq.png" alt="QQ图标">
      <div class="file-name">QQ历史版本</div>
      <span>></span>
    </a>
    <a class="file-item" href="https://m.wandoujia.com/apps/596157/history" target="_blank">
      <img class="file-icon" src="https://img.icons8.com/fluency/48/000000/wechat.png" alt="微信图标">
      <div class="file-name">微信历史版本</div>
      <span>></span>
    </a>
    <a class="file-item" href="#">
      <img class="file-icon" src="https://img.icons8.com/fluency/48/000000/software-box.png" alt="软件图标">
      <div class="file-name">实用软件</div>
      <span>></span>
    </a>
    <a class="file-item" href="#">
      <img class="file-icon" src="https://img.icons8.com/fluency/48/000000/stack.png" alt="框架图标">
      <div class="file-name">应用框架</div>
      <span>></span>
    </a>
  </div>

  <div class="lyric-box">
    <div class="lyric">你真的懂唯一 的定义 不只是如影随形</div>
  </div>

  <script>
    const audio = document.getElementById('bgm');
    // 兼容自动播放策略
    document.body.addEventListener('click', () => {
      audio.play().catch(e => console.log("播放失败:", e));
    }, { once: true });
  </script>
</body>
</html>
