  <style>
    /* 合并所有版本的样式，并优化 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --accent: #ff6b6b;
      --success: #10b981;
      --text: #1a1a1a;
      --bg-card: rgba(255, 255, 255, 0.97);
      --border: rgba(0, 0, 0, 0.15);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      --radius: 20px;
      --bg-body: #f5f7fa;
      --lock-bg: rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] {
      --text: #e0e0e0;
      --bg-card: rgba(30, 30, 30, 0.97);
      --border: rgba(255, 255, 255, 0.15);
      --bg-body: #121212;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      --lock-bg: rgba(255, 255, 255, 0.05);
    }

    /* 移动端优化 */
    html {
      scroll-behavior: smooth;
    }
    input, button {
      -webkit-appearance: none;
      outline: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
      padding: 24px;
      background: var(--bg-body);
      transition: background 0.3s;
      position: relative;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 38px;
      padding-bottom: 28px;
      border-bottom: 2px solid var(--border);
    }

    .time-section {
      text-align: center;
    }

    .time {
      font-size: 2.8rem;
      font-weight: 200;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }

    .date {
      font-size: 1.15rem;
      opacity: 0.9;
    }

    .sync-status {
      font-size: 0.85rem;
      color: #666;
      margin-top: 8px;
      min-height: 1.2em;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .btn {
      background: rgba(0, 0, 0, 0.1);
      border: none;
      color: var(--text);
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 0.97em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-4px);
      background: rgba(0, 0, 0, 0.18);
    }

    .btn:active {
      transform: translateY(0);
    }

    .category {
      margin-bottom: 38px;
    }

    .category-title {
      font-size: 1.35em;
      margin-bottom: 20px;
      padding-left: 20px;
      border-left: 5px solid var(--accent);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .category-title::after {
      content: "\25BC";
      font-size: 0.8em;
      transition: transform 0.3s;
    }

    .category.collapsed .category-title::after {
      transform: rotate(-90deg);
    }

    .category-content {
      overflow: hidden;
      transition: max-height 0.4s ease;
      max-height: 5000px;
    }

    .category.collapsed .category-content {
      max-height: 0 !important;
    }

    .link-list {
      list-style: none;
    }

    .link-item {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.12);
      transition: all 0.35s ease;
    }

    .link-item:hover {
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transform: translateX(8px);
    }

    .link-name {
      flex: 1;
      margin-right: 20px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-tag {
      background: var(--accent);
      font-size: 0.77em;
      padding: 7px 16px;
      border-radius: 25px;
      color: #fff;
      white-space: nowrap;
    }

    .add-form {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .form-input {
      flex: 1;
      min-width: 150px;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.08);
      font-size: 1em;
      color: var(--text);
    }

    .add-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 0 34px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .add-btn:active {
      opacity: 0.7;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 34px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 34px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 1.55em;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 2.4em;
      cursor: pointer;
      line-height: 1;
    }

    .notification {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(130px);
      background: rgba(0, 0, 0, 0.97);
      color: #fff;
      padding: 20px 38px;
      border-radius: 50px;
      z-index: 3000;
      transition: transform 0.65s;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notification.show {
      transform: translateX(-50%) translateY(0);
    }

    .log-item {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .log-time {
      color: #666;
    }

    .log-success {
      color: #10b981;
    }

    .log-fail {
      color: #ff6b6b;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.5em;
      cursor: pointer;
      color: var(--text);
      z-index: 100;
    }

    .search-bar {
      margin-bottom: 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1;
      min-width: 200px;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.08);
      font-size: 1em;
      color: var(--text);
    }

    .highlight {
      background: yellow;
      color: black;
      padding: 0 2px;
      border-radius: 3px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }

    .lock-overlay {
      background: var(--lock-bg);
      border-radius: 14px;
      padding: 30px;
      text-align: center;
      margin: 10px 0;
      backdrop-filter: blur(4px);
      border: 1px dashed var(--border);
      cursor: pointer;
      transition: all 0.3s;
    }

    .lock-overlay:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: scale(1.02);
    }

    .lock-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .lock-text {
      font-size: 1.1rem;
      opacity: 0.8;
    }

    .unlocked-badge {
      background: var(--success);
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      margin-left: 12px;
    }

    .back-to-top {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: var(--accent);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s;
      z-index: 99;
      border: none;
    }

    .back-to-top:hover {
      opacity: 1;
    }

    .recommend-card {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 28px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .recommend-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .recommend-link {
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      word-break: break-word;
    }

    .recommend-link:hover {
      text-decoration: underline;
    }

    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }

    .share-buttons .btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    @media (max-width: 480px) {
      .card {
        padding: 26px;
      }

      .time {
        font-size: 2.2rem;
      }

      .btn {
        padding: 14px 16px;
        font-size: 0.93em;
      }

      .quick-links {
        grid-template-columns: 1fr;
      }

      .btn-group {
        grid-template-columns: repeat(2, 1fr);
      }

      .theme-toggle {
        position: relative;
        top: auto;
        right: auto;
        margin-bottom: 16px;
      }

      .back-to-top {
        bottom: 80px;
        right: 15px;
        width: 45px;
        height: 45px;
        font-size: 1.3rem;
      }
    }
  </style>

          li.appendChild(nameSpan);

        // 解锁收藏
        unlockFavorites() {
          if (this.state.favoritesUnlocked) return true;
          if (this.state.lockUntil > Date.now()) {
            showNotification('⏳ 已锁定，请稍后再试');
            return false;
          }
          const password = prompt('请输入密码以查看收藏：');
          if (password === FAVORITE_PASSWORD) {
            this.state.favoritesUnlocked = true;
            this.state.passwordAttempts = 0;
            sessionStorage.setItem('favoritesUnlocked', 'true');
            sessionStorage.setItem('passwordAttempts', '0');
            sessionStorage.removeItem('lockUntil');
            // 重新渲染收藏模态框内容
            this.renderFavoritesInModal();
            showNotification('🔓 收藏已解锁');
            return true;
          } else {
            this.state.passwordAttempts++;
            sessionStorage.setItem('passwordAttempts', this.state.passwordAttempts.toString());
            if (this.state.passwordAttempts >= MAX_PASSWORD_ATTEMPTS) {
              this.state.lockUntil = Date.now() + LOCK_TIME;
              sessionStorage.setItem('lockUntil', this.state.lockUntil.toString());
              this.state.favoritesUnlocked = false;
              sessionStorage.setItem('favoritesUnlocked', 'false');
              showNotification('❌ 错误次数过多，锁定10分钟');
              this.renderFavoritesInModal();
            } else {
              showNotification(`❌ 密码错误，还剩 ${MAX_PASSWORD_ATTEMPTS - this.state.passwordAttempts} 次机会`);
            }
            return false;
          }
        }

            try {
              const links = JSON.parse(e.target.result);

              this.state.links = links;

        // 同步到Gist
        async syncToGist() {
          if (this.state.syncInProgress) return showNotification('同步进行中...');
          const token = this.state.token;
          if (!token) {
            showNotification('请先设置 Token');
            this.openModal('token-modal');
            return;
          }
          const links = this.state.links;
          if (!links.length) return showNotification('没有收藏可同步');

          this.state.syncInProgress = true;
          showNotification('同步中...', 60000);

          const filename = 'baibaodai_favorites.json';
          const content = JSON.stringify(links, null, 2);
          const body = { description: '百宝袋AI工具箱 - 我的收藏', public: false, files: { [filename]: { content } } };

          try {
            let res;
            if (this.state.gistId) {
              res = await this.fetchWithRetry(`https://api.github.com/gists/${this.state.gistId}`, {
                method: 'PATCH',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify(body)
              });
            } else {
              res = await this.fetchWithRetry('https://api.github.com/gists', {
                method: 'POST',
                headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
                body: JSON.stringify(body)
              });
            }
            const data = await res.json();
            if (!this.state.gistId) {
              this.state.gistId = data.id;
              localStorage.setItem(STORAGE_KEYS.GIST_ID, data.id);
            }
            const nowStr = new Date().toLocaleString('zh-CN');
            this.state.lastSync = nowStr;
            localStorage.setItem(STORAGE_KEYS.LAST_SYNC, nowStr);
            this.updateSyncStatus();
            showNotification('☁️ 已同步到 GitHub Gist');
            this.writeLog('手动同步', true, '同步到云端成功');
          } catch (err) {
            showNotification('❌ 同步失败：' + err.message);
            this.writeLog('手动同步', false, err.message);
          } finally {
            this.state.syncInProgress = false;
          }
        }

        // 从Gist恢复
        async restoreFromGist() {
          if (this.state.syncInProgress) return showNotification('操作进行中...');
          const token = this.state.token;
          if (!token) {
            showNotification('请先设置 Token');
            this.openModal('token-modal');
            return;
          }
          if (!this.state.gistId) {
            showNotification('没有找到云端备份，请先同步一次');
            return;
          }
          this.state.syncInProgress = true;
          showNotification('恢复中...', 60000);
          try {
            const res = await this.fetchWithRetry(`https://api.github.com/gists/${this.state.gistId}`, {
              headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
            });
            const data = await res.json();
            const filename = 'baibaodai_favorites.json';
            if (!data.files || !data.files[filename]) throw new Error('云端没有收藏文件');
            const content = data.files[filename].content;
            const links = JSON.parse(content);
            if (!Array.isArray(links)) throw new Error('数据格式错误');
            this.state.links = links;
            setStorage(STORAGE_KEYS.LINKS, links);
            showNotification('✅ 已从云端恢复');
            this.writeLog('从云端恢复', true, `恢复 ${links.length} 条`);
            this.renderFavoritesInModal();
          } catch (err) {
            showNotification('❌ 恢复失败：' + err.message);
            this.writeLog('从云端恢复', false, err.message);
          } finally {
            this.state.syncInProgress = false;
          }
        }

        // 带重试的fetch
        async fetchWithRetry(url, options, retries = 2, delay = 1500) {
          let lastErr;
          for (let i = 0; i <= retries; i++) {
            try {
              const res = await fetch(url, options);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              return res;
            } catch (err) {
              lastErr = err;
              if (i < retries) await new Promise(r => setTimeout(r, delay));
            }
          }
          throw lastErr;
        }

        // 写日志
        writeLog(type, success, detail) {
          const logs = this.state.logs;
          const now = new Date();
          const timeStr = now.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
          logs.unshift({ time: timeStr, type, success, detail });
          if (logs.length > 50) logs.pop();
          this.state.logs = logs;
          setStorage(STORAGE_KEYS.LOG, logs);
          this.renderLogPanel();
        }

        // 搜索
        doSearch() {
          const keyword = document.getElementById('global-search').value.trim().toLowerCase();
          this.searchKeyword = keyword;
          const allItems = document.querySelectorAll('.link-item');
          allItems.forEach(item => {
            const name = item.getAttribute('data-name') || item.querySelector('.link-name').textContent.toLowerCase();
            const url = item.getAttribute('data-url') || '';
            const match = name.includes(keyword) || url.toLowerCase().includes(keyword);
            item.style.display = match ? 'flex' : 'none';
            if (match && keyword) {
              const nameEl = item.querySelector('.link-name');
              const regex = new RegExp(`(${this.escapeRegExp(keyword)})`, 'gi');
              nameEl.innerHTML = nameEl.textContent.replace(regex, '<span class="highlight">$1</span>');
            } else {
              const nameEl = item.querySelector('.link-name');
              nameEl.innerHTML = nameEl.textContent;
            }
          });
        }

        clearSearch() {
          document.getElementById('global-search').value = '';
          this.doSearch();
        }

        escapeRegExp(str) {
          return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        renderLogPanel(filtered) {
          const panel = document.getElementById('log-panel');
          const logs = filtered || this.state.logs;
          if (!logs.length) {
            panel.innerHTML = '<div class="log-empty">暂无同步日志</div>';
            return;
          }
          panel.innerHTML = logs.map(log => `
            <div class="log-item">
              <div class="log-time">${log.time}</div>
              <div><span class="log-type">${log.type}</span> <span class="${log.success ? 'log-success' : 'log-fail'}">${log.success ? '成功' : '失败'}</span></div>
              <div class="log-detail">${log.detail}</div>
            </div>
          `).join('');
        }

        applyLogFilter() {
          const start = document.getElementById('filter-start-date').value;
          const end = document.getElementById('filter-end-date').value;
          let filtered = this.state.logs;
          if (start) {
            const startDate = new Date(start);
            filtered = filtered.filter(log => new Date(log.time.replace(/\//g, '-')) >= startDate);
          }
          if (end) {
            const endDate = new Date(end);
            endDate.setHours(23, 59, 59, 999);
            filtered = filtered.filter(log => new Date(log.time.replace(/\//g, '-')) <= endDate);
          }
          this.renderLogPanel(filtered);
        }

        resetLogFilter() {
          document.getElementById('filter-start-date').value = '';
          document.getElementById('filter-end-date').value = '';
          this.renderLogPanel(this.state.logs);

          if (!logs.length) return showNotification('暂无日志');

          const rows = logs.map(l => [l.time, l.type, l.success ? '成功' : '失败', `"${(l.detail || '').replace(/"/g, '""')}"`]);
          const csv = '\uFEFF' + [header.join(','), ...rows.map(r => r.join(','))].join('\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'sync_log.csv';

        // 事件绑定
        attachEvents() {
          document.addEventListener('click', (e) => {
            const target = e.target;

            // 模态框关闭
            if (target.matches('.close-btn')) {
              const modalId = target.getAttribute('data-close');
              this.closeModal(modalId);
            }

            // 打开模态框
            if (target.matches('[data-modal]')) {
              const modalId = target.getAttribute('data-modal');
              this.openModal(modalId);
            }

            // 快速链接
            if (target.matches('[data-quick]')) {
              const cmd = target.getAttribute('data-quick');
              if (cmd === 'resource') openLink('https://www.pandashi8.com/');
              else if (cmd === 'short') openLink('https://www.urlc.cn/');
              else if (cmd === 'video') openLink('https://dy.kukutool.com/');
            }

            // 关于（不再使用旧的通知）
            if (target.matches('[data-about]')) {
              // 已被收藏模态框替代
              this.openModal('favorites-modal');
            }

            // 数据URL按钮
            if (target.matches('[data-url]')) {
              openLink(target.getAttribute('data-url'));
            }

            // 添加网盘
            if (target.matches('[data-add="cloud"]')) {
              this.addCloudResource();
            }

            // 添加公开分享
            if (target.matches('[data-add="public"]')) {
              this.addPublicShare();
            }

            // 发布
            if (target.matches('[data-publish]')) {
              this.publishPublicShare();
            }

            // 刷新公开
            if (target.matches('[data-refresh-public]')) {
              this.refreshPublicShares();
            }

            // 保存Token
            if (target.matches('#saveTokenBtn')) {
              this.saveToken();
            }

            // 日志筛选
            if (target.matches('#applyLogFilter')) {
              this.applyLogFilter();
            }
            if (target.matches('#resetLogFilter')) {
              this.resetLogFilter();
            }
            if (target.matches('#clearLogBtn')) {
              this.clearLog();
            }
            if (target.matches('#exportLogBtn')) {
              this.exportLogCSV();
            }

            // 分类折叠
            if (target.matches('.category-title')) {
              const cat = target.closest('.category');
              if (cat) this.toggleCategory(cat.id);
            }

            // 解锁点击（在模态框内）
            if (target.matches('[data-unlock="true"]') || target.closest('[data-unlock="true"]')) {
              this.unlockFavorites();
            }

            // 分享网站
            if (target.matches('#shareSiteBtn')) {
              this.shareSite();
            }

            // 反馈
            if (target.matches('#feedbackBtn')) {
              this.openFeedback();
            }

            // 清空搜索
            if (target.matches('#clearSearchBtn')) {
              this.clearSearch();
            }

            // 模态框内收藏操作
            if (target.matches('#modal-add-custom')) {
              this.addCustomLinkFromModal();
            }
            if (target.matches('#modal-export')) {
              this.exportLinks();
            }
            if (target.matches('#modal-import')) {
              document.getElementById('modal-import-file').click();
            }
            if (target.matches('#modal-sync')) {
              this.syncToGist();
            }
            if (target.matches('#modal-restore')) {
              this.restoreFromGist();
            }
          });

          // 文件导入（模态框内）
          document.getElementById('modal-import-file')?.addEventListener('change', (e) => this.importLinks(e));

          // 普通导入（旧页面可能还有，保留）
          document.getElementById('import-file')?.addEventListener('change', (e) => this.importLinks(e));

          // 搜索防抖
          document.getElementById('global-search')?.addEventListener('input', this.debounce(() => this.doSearch(), 300));

          // 主题切换
          document.getElementById('themeToggle')?.addEventListener('click', () => this.toggleTheme());

          // 返回顶部
          document.getElementById('backToTop')?.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });

          // 模态框背景关闭
          document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
              if (e.target === modal) this.closeModal(modal.id);
            });
          });
        }

        debounce(fn, delay) {
          let timer;
          return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
          };
        }
      }

      // 启动应用
      window.app = new BaibaoApp();
    })();
  </script>
</body>
</html>
