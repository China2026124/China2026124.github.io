<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>百宝袋AI工具箱 - 全功能可折叠版</title>
  <style>
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --accent: #ff6b6b;
      --success: #10b981;
      --text: #1a1a1a;
      --bg-card: rgba(255, 255, 255, 0.97);
      --border: rgba(0, 0, 0, 0.15);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      --radius: 20px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
      padding: 24px;
      background: #f5f7fa;
      background-image: url('https://img1.qunarzz.com/imgs/201808/31/F.5e5b5b5b5b5b5b5b5b5b5b5.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .app { max-width: 600px; margin: 0 auto; }
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 38px;
      padding-bottom: 28px;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
      justify-content: center;
    }
    .avatar {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      border: 4px solid rgba(0, 0, 0, 0.35);
      object-fit: cover;
      background: url('https://api.dicebear.com/7.x/notionists/svg?seed=1') no-repeat center;
      background-size: cover;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.25);
    }
    .avatar:hover { transform: scale(1.1); }
    .time-section { flex: 1; min-width: 200px; text-align: center; }
    .time { font-size: 2.8rem; font-weight: 200; margin-bottom: 10px; }
    .date { font-size: 1.15rem; opacity: 0.9; }
    .quick-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .quick-links .btn { padding: 18px 14px; font-size: 0.97em; border: none; background: rgba(0,0,0,0.1); border-radius: 16px; font-weight: 500; cursor: pointer; }
    .quick-links .btn:hover { transform: translateY(-4px); background: rgba(0, 0, 0, 0.18); }
    .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
    .btn { background: rgba(0, 0, 0, 0.1); border: none; color: var(--text); padding: 16px 20px; border-radius: 16px; font-size: 0.97em; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { transform: translateY(-4px); background: rgba(0, 0, 0, 0.18); }
    .category { margin-bottom: 38px; }
    .category-title { font-size: 1.35em; margin-bottom: 20px; padding-left: 20px; border-left: 5px solid var(--accent); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .category-title::after { content: '▼'; font-size: 0.8em; transition: transform 0.3s; }
    .category.collapsed .category-title::after { transform: rotate(-90deg); }
    .category-content { overflow: hidden; transition: max-height 0.4s ease; }
    .category.collapsed .category-content { max-height: 0 !important; }
    .link-list { list-style: none; }
    .link-item {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.12);
      transition: all 0.35s ease;
    }
    .link-item:hover { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); transform: translateX(8px); }
    .link-name { flex: 1; margin-right: 20px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .link-tag { background: var(--accent); font-size: 0.77em; padding: 7px 16px; border-radius: 25px; color: #fff; }
    .link-tag.new { background: var(--success); }
    .link-tag.hot { background: #f59e0b; }
    .link-tag.tool { background: #3498db; }
    .link-tag.pdf { background: #e74c3c; }
    .link-tag.image { background: #9b59b6; }
    .link-tag.media { background: #e67e22; }
    .link-tag.office { background: #1abc9c; }
    .link-tag.developer { background: #34495e; }
    .link-tag.book { background: #d35400; }
    .link-tag.ai { background: #8e44ad; }
    .add-form { display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap; }
    .form-input { flex: 1; min-width: 150px; padding: 16px 20px; border: none; border-radius: 14px; background: rgba(0,0,0,0.08); font-size: 1em; }
    .add-btn { background: var(--accent); border: none; color: #fff; padding: 0 34px; border-radius: 14px; cursor: pointer; font-weight: 600; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-card); border-radius: var(--radius); padding: 34px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 34px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 1.55em; font-weight: 600; }
    .close-btn { background: none; border: none; color: var(--text); font-size: 2.4em; cursor: pointer; line-height: 1; }
    .notification { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(130px); background: rgba(0,0,0,0.97); color: #fff; padding: 20px 38px; border-radius: 50px; z-index: 3000; transition: transform 0.65s; }
    .notification.show { transform: translateX(-50%) translateY(0); }
    @media (max-width: 480px) {
      .card { padding: 26px; }
      .time { font-size: 2.2rem; }
      .avatar { width: 80px; height: 80px; }
      .btn { padding: 14px 16px; font-size: 0.93em; }
      .quick-links { grid-template-columns: 1fr; }
      .btn-group { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="main-app" class="app">
    <div class="card">
      <div class="header">
        <div class="avatar" id="avatar" title="点击更换头像"></div>
        <div class="time-section">
          <div id="time" class="time">00:00:00</div>
          <div id="date" class="date">2026年2月28日 星期六</div>
        </div>
      </div>
      
      <div class="quick-links">
        <button class="btn" onclick="openLink('https://www.pandashi8.com/')">📦 资源分享</button>
        <button class="btn" onclick="openLink('https://www.urlc.cn/')">🔗 短链生成</button>
        <button class="btn" onclick="openLink('https://dy.kukutool.com/')">🎬 视频解析</button>
      </div>
      
      <div class="btn-group">
        <button class="btn" onclick="openModal('theme-modal')">🎨 主题</button>
        <button class="btn" onclick="openModal('cloud-modal')">☁️ 网盘搜索</button>
        <button class="btn" onclick="openModal('qqwx-modal')">💬 QQ/微信历史版</button>
        <button class="btn" onclick="changeBackground()">🖼️ 换背景</button>
        <button class="btn" onclick="changeAvatar()">🙆 换头像</button>
        <button class="btn" onclick="showNotification('欢迎使用百宝袋AI工具箱！')">👋 关于</button>
      </div>
      
      <!-- 万能工具合集 -->
      <div class="category" id="cat-tools">
        <div class="category-title" onclick="toggleCategory('cat-tools')">🔧 万能工具合集</div>
        <div class="category-content">
          <ul class="link-list" id="tools-list"></ul>
        </div>
      </div>
      
      <!-- 影视资源 -->
      <div class="category" id="cat-movie">
        <div class="category-title" onclick="toggleCategory('cat-movie')">🎬 影视资源</div>
        <div class="category-content">
          <ul class="link-list" id="movie-list"></ul>
        </div>
      </div>
      
      <!-- 网盘资源共享 -->
      <div class="category" id="cat-cloud">
        <div class="category-title" onclick="toggleCategory('cat-cloud')">📁 网盘资源共享</div>
        <div class="category-content">
          <ul class="link-list" id="cloud-list"></ul>
          <div class="add-form">
            <input type="text" id="cloud-name" class="form-input" placeholder="资源名称">
            <input type="text" id="cloud-url" class="form-input" placeholder="云盘链接" onkeypress="if(event.key==='Enter') addCloud()">
            <select id="cloud-type" class="form-input">
              <option value="阿里云盘">阿里云盘</option>
              <option value="百度网盘">百度网盘</option>
              <option value="蓝奏云">蓝奏云</option>
              <option value="迅雷云盘">迅雷云盘</option>
            </select>
            <button class="add-btn" onclick="addCloud()">+ 添加</button>
          </div>
        </div>
      </div>
      
      <!-- 音乐与小说 -->
      <div class="category" id="cat-music-novel">
        <div class="category-title" onclick="toggleCategory('cat-music-novel')">🎵 音乐与小说</div>
        <div class="category-content">
          <ul class="link-list" id="music-novel-list"></ul>
        </div>
      </div>
      
      <!-- 我的收藏 -->
      <div class="category" id="cat-custom">
        <div class="category-title" onclick="toggleCategory('cat-custom')">📌 我的收藏</div>
        <div class="category-content">
          <ul id="custom-links" class="link-list"></ul>
          <div class="add-form">
            <input type="text" id="link-name" class="form-input" placeholder="链接名称" maxlength="20">
            <input type="text" id="link-url" class="form-input" placeholder="https://" onkeypress="if(event.key==='Enter') addLink()">
            <button class="add-btn" onclick="addLink()">+ 添加</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 模态框 -->
  <div id="theme-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">🎨 主题设置</h3>
        <button class="close-btn" onclick="closeModal('theme-modal')">&times;</button>
      </div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 20px;">
        <button class="btn" style="background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;" onclick="setTheme('default')">默认</button>
        <button class="btn" style="background:linear-gradient(135deg,#2c3e50,#1a1a2e); color:#fff;" onclick="setTheme('dark')">深色</button>
        <button class="btn" style="background:linear-gradient(135deg,#00b09b,#96c93d); color:#fff;" onclick="setTheme('green')">绿色</button>
        <button class="btn" style="background:linear-gradient(135deg,#9d50bb,#6e48aa); color:#fff;" onclick="setTheme('purple')">紫色</button>
        <button class="btn" style="background:linear-gradient(135deg,#ff6b6b,#ff8e53); color:#fff;" onclick="setTheme('orange')">橙色</button>
        <button class="btn" style="background:linear-gradient(135deg,#3498db,#2980b9); color:#fff;" onclick="setTheme('blue')">蓝色</button>

    </div>
  </div>

  <div id="cloud-modal" class="modal">

    </div>
  </div>

  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">⚙️ 设置</h3>
        <button class="close-btn" onclick="closeModal('settings-modal')">&times;</button>
      </div>
      <div style="margin-top: 20px;">
        <button class="btn btn-danger" style="width:100%; margin:10px 0;" onclick="clearData()">🗑️ 清空数据</button>
        <button class="btn" style="width:100%; margin:10px 0;" onclick="exportData()">💾 导出数据</button>
        <button class="btn" style="width:100%; margin:10px 0;" onclick="document.getElementById('import-file').click()">📥 导入数据</button>
        <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
      </div>
    </div>
  </div>

  <div id="notification" class="notification"></div>

    // 影视资源数据
    const MOVIE_DATA = [
      { name: "茶杯狐 (聚合搜索)", url: "https://cupfox.app", tag: "hot" },
      { name: "LIBVIO 低端影视", url: "https://www.libvio.me", tag: "" },
      { name: "555电影", url: "https://www.555dy1.com", tag: "hot" },
      { name: "奈菲影视", url: "https://www.nfmovies.com", tag: "" }
    ];

    // 初始网盘资源
    const INIT_CLOUD_DATA = [
      { name: "常用软件合集", url: "https://www.aliyundrive.com/s/", type: "阿里云盘" },
      { name: "办公模板大全", url: "https://pan.baidu.com/s/", type: "百度网盘" },
      { name: "高清壁纸资源", url: "https://www.aliyundrive.com/s/", type: "阿里云盘" }
    ];

    // 音乐与小说数据
    const MUSIC_NOVEL_DATA = [
      { name: "网易云音乐", url: "https://music.163.com/", tag: "music" },
      { name: "酷狗音乐", url: "https://www.kugou.com/", tag: "music" },
      { name: "QQ音乐", url: "https://www.qqmusic.com/", tag: "music" },
      { name: "酷我音乐", url: "https://www.kuwo.cn/", tag: "music" },
      { name: "起点中文网", url: "https://www.qidian.com/", tag: "novel" },
      { name: "纵横中文网", url: "https://www.zongheng.com/", tag: "novel" },
      { name: "17K小说网", url: "https://www.17k.com/", tag: "novel" },
      { name: "晋江文学城", url: "https://www.jjwxc.net/", tag: "novel" }
    ];

    function init() {
      updateTime();
      setInterval(updateTime, 1000);
      renderTools();
      renderMovies();
      renderMusicNovel();
      renderCloud();
      renderCustomLinks();
      loadCloudFromStorage();
      // 默认折叠
      ['cat-tools', 'cat-movie', 'cat-cloud', 'cat-music-novel', 'cat-custom'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('collapsed');
      });
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
      document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    function openLink(url) {
      if (!url.startsWith('http')) url = 'https://' + url;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function toggleCategory(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('collapsed');
    }

    function renderTools() {
      const container = document.getElementById('tools-list');
      container.innerHTML = '';
      TOOLS_DATA.forEach(cat => {
        const title = document.createElement('div');
        title.className = 'category-title';
        title.style.fontSize = '1.1em';
        title.style.margin = '20px 0 10px';
        title.style.paddingLeft = '15px';
        title.style.borderLeft = '3px solid var(--accent)';
        title.textContent = cat.category;
        container.appendChild(title);
        cat.items.forEach(item => {
          const li = document.createElement('li');
          li.className = 'link-item';
          li.innerHTML = `<span class="link-name">${item.name}</span><span class="link-tag ${item.tag}">${getTagLabel(item.tag)}</span>`;
          li.onclick = () => openLink(item.url);
          container.appendChild(li);
        });
      });
    }

    function getTagLabel(tag) {
      const map = { tool: '工具', pdf: 'PDF', image: '图片', media: '媒体', office: '办公', developer: '开发', book: '电子书', ai: 'AI' };
      return map[tag] || '工具';
    }

    function renderMovies() {
      const container = document.getElementById('movie-list');
      container.innerHTML = '';
      MOVIE_DATA.forEach(movie => {
        const li = document.createElement('li');
        li.className = 'link-item';
        li.innerHTML = `<span class="link-name">${movie.name}</span><span class="link-tag ${movie.tag}">${movie.tag === 'hot' ? '热' : ''}</span>`;
        li.onclick = () => openLink(movie.url);
        container.appendChild(li);
      });
    }

    function renderMusicNovel() {
      const container = document.getElementById('music-novel-list');
      container.innerHTML = '';
      MUSIC_NOVEL_DATA.forEach(item => {
        const li = document.createElement('li');
        li.className = 'link-item';
        li.innerHTML = `<span class="link-name">${item.name}</span><span class="link-tag ${item.tag}">${item.tag === 'music' ? '音乐' : '小说'}</span>`;
        li.onclick = () => openLink(item.url);
        container.appendChild(li);
      });
    }

    function renderCloud() {
      const container = document.getElementById('cloud-list');
      container.innerHTML = '';
      const cloudData = JSON.parse(localStorage.getItem('baibaodai_cloud') || '[]');
      const data = cloudData.length ? cloudData : INIT_CLOUD_DATA;
      data.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'link-item';
        li.innerHTML = `<span class="link-name">${item.name} (${item.type})</span><span class="link-tag">网盘</span>`;
        li.onclick = () => openLink(item.url);
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '✕';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteCloud(idx); };
        li.appendChild(delBtn);
        container.appendChild(li);
      });
    }

    function addCloud() {
      const name = document.getElementById('cloud-name').value.trim();
      let url = document.getElementById('cloud-url').value.trim();
      const type = document.getElementById('cloud-type').value;
      if (!name || !url) { showNotification('请填写完整信息'); return; }
      if (!url.startsWith('http')) url = 'https://' + url;
      const cloudData = JSON.parse(localStorage.getItem('baibaodai_cloud') || '[]');
      cloudData.push({ name, url, type });
      localStorage.setItem('baibaodai_cloud', JSON.stringify(cloudData));
      renderCloud();
      document.getElementById('cloud-name').value = '';
      document.getElementById('cloud-url').value = '';
      showNotification('✅ 网盘资源已添加');
    }

    function deleteCloud(idx) {
      const cloudData = JSON.parse(localStorage.getItem('baibaodai_cloud') || '[]');
      cloudData.splice(idx, 1);
      localStorage.setItem('baibaodai_cloud', JSON.stringify(cloudData));
      renderCloud();
      showNotification('🗑️ 网盘资源已删除');
    }

    function loadCloudFromStorage() {
      if (!localStorage.getItem('baibaodai_cloud')) {
        localStorage.setItem('baibaodai_cloud', JSON.stringify(INIT_CLOUD_DATA));
      }
    }

    function renderCustomLinks() {
      const container = document.getElementById('custom-links');
      container.innerHTML = '';
      const links = JSON.parse(localStorage.getItem('baibaodai_links') || '[]');
      links.forEach((link, idx) => {
        const li = document.createElement('li');
        li.className = 'link-item';
        li.innerHTML = `<span class="link-name">${link.name}</span><span class="link-tag">收藏</span>`;
        li.onclick = () => openLink(link.url);
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '✕';
        delBtn.onclick = (e) => { e.stopPropagation(); deleteLink(idx); };
        li.appendChild(delBtn);
        container.appendChild(li);
      });
    }

    function addLink() {
      const name = document.getElementById('link-name').value.trim();
      let url = document.getElementById('link-url').value.trim();
      if (!name || !url) { showNotification('请填写完整信息'); return; }
      if (!url.startsWith('http')) url = 'https://' + url;
      const links = JSON.parse(localStorage.getItem('baibaodai_links') || '[]');
      links.push({ name, url });
      localStorage.setItem('baibaodai_links', JSON.stringify(links));
      renderCustomLinks();
      document.getElementById('link-name').value = '';
      document.getElementById('link-url').value = '';
      showNotification('✅ 链接已添加');
    }

    function deleteLink(idx) {
      const links = JSON.parse(localStorage.getItem('baibaodai_links') || '[]');
      links.splice(idx, 1);
      localStorage.setItem('baibaodai_links', JSON.stringify(links));
      renderCustomLinks();
      showNotification('🗑️ 链接已删除');
    }

    function changeBackground() {
      const images = [
        'https://img1.qunarzz.com/imgs/201808/31/F.5e5b5b5b5b5b5b5b5b5b5b5.jpg',
        'https://img.zcool.cn/community/01b72057a7e0790000018c1bf4fce0.jpg',
        'https://img2.baidu.com/it/u=1234567890,987654321&fm=253&fmt=auto&app=138&f=JPEG?w=1920&h=1080',
        'https://img3.baidu.com/it/u=1122334455,5544332211&fm=253&fmt=auto&app=120&f=JPEG?w=1920&h=1080',
        'https://img4.baidu.com/it/u=9988776655,4433221100&fm=253&fmt=auto&app=138&f=JPEG?w=1920&h=1080'
      ];
      const current = document.body.style.backgroundImage;
      const next = images[(images.indexOf(current) + 1) % images.length];
      document.body.style.backgroundImage = `url('${next}')`;
      showNotification('🖼️ 背景已切换');
    }

    function changeAvatar() {
      const avatars = [
        'https://api.dicebear.com/7.x/notionists/svg?seed=1',
        'https://api.dicebear.com/7.x/notionists/svg?seed=2',
        'https://api.dicebear.com/7.x/notionists/svg?seed=3',
        'https://api.dicebear.com/7.x/notionists/svg?seed=4',
        'https://api.dicebear.com/7.x/notionists/svg?seed=5'
      ];
      const current = document.getElementById('avatar').style.backgroundImage;
      const next = avatars[(avatars.findIndex(a => current.includes(a)) + 1) % avatars.length];
      document.getElementById('avatar').style.backgroundImage = `url('${next}')`;
      showNotification('🙆 头像已更换');
    }

    function openModal(id) {
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function showNotification(msg) {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.classList.add('show');
      setTimeout(() => n.classList.remove('show'), 2500);
    }

    function setTheme(theme) {
      showNotification('主题已切换: ' + theme);
      closeModal('theme-modal');
    }

    function clearData() {
      if (confirm('确定清空所有数据吗？')) {
        localStorage.removeItem('baibaodai_links');
        localStorage.removeItem('baibaodai_cloud');
        renderCustomLinks();
        renderCloud();
        showNotification('🗑️ 数据已清空');
      }
    }

    function exportData() {
      const data = {
        links: JSON.parse(localStorage.getItem('baibaodai_links') || '[]'),
        cloud: JSON.parse(localStorage.getItem('baibaodai_cloud') || '[]')
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'baibaodai_backup.json';
      a.click();
      showNotification('💾 数据已导出');
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.links && Array.isArray(data.links)) {
            localStorage.setItem('baibaodai_links', JSON.stringify(data.links));
          }
          if (data.cloud && Array.isArray(data.cloud)) {
            localStorage.setItem('baibaodai_cloud', JSON.stringify(data.cloud));
          }
          renderCustomLinks();
          renderCloud();
          showNotification('📥 数据已导入');
        } catch {
          showNotification('❌ 解析失败');
        }
      };
      reader.readAsText(file);
    }

    init();
  </script>
</body>
